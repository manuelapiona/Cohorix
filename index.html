<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cohorix — iGaming Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060810;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
input,select,button{font-family:inherit;font-size:inherit}
.hidden{display:none!important}

/* UPLOAD */
#upload{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;background:#060810;position:relative;overflow:hidden}
#upload::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px);background-size:56px 56px;pointer-events:none}
.logo-big{font-size:48px;font-weight:900;letter-spacing:-2px;color:#f1f5f9;margin-bottom:8px;position:relative}
.logo-big span{color:#38bdf8}
.logo-sub{font-size:11px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.drop-zone{width:min(500px,100%);border:2px dashed rgba(255,255,255,0.12);border-radius:20px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,0.015);position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:#38bdf8;background:rgba(56,189,248,0.05)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-icon{font-size:40px;margin-bottom:12px}
.drop-text{font-size:15px;color:#94a3b8;margin-bottom:6px}
.drop-hint{font-size:11px;color:#334155}
.loaded-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.pill-ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);border-radius:20px;padding:3px 14px;font-size:11px;color:#22c55e}
.file-hints{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;max-width:500px;width:100%}
.fh{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;text-align:center}
.fh-icon{font-size:20px;margin-bottom:6px}
.fh-title{font-size:11px;font-weight:700;margin-bottom:3px}
.fh-desc{font-size:9px;color:#334155;line-height:1.5}
#upload-error{margin-top:16px;color:#ef4444;font-size:12px;max-width:480px;text-align:center}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
#app.visible{display:flex}

/* NAV */
nav{background:rgba(6,8,16,0.98);border-bottom:1px solid rgba(255,255,255,0.07);padding:0 16px;display:flex;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:200;gap:2px}
.nav-logo{font-size:17px;font-weight:900;letter-spacing:-0.5px;color:#f1f5f9;padding:12px 0;margin-right:20px;white-space:nowrap}
.nav-logo span{color:#38bdf8}
.nav-tabs{display:flex;flex:1;flex-wrap:wrap;overflow-x:auto}
.tab{padding:12px 9px;font-size:9px;cursor:pointer;color:#475569;border:none;border-bottom:2px solid transparent;background:none;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;font-weight:500;transition:color .15s}
.tab:hover{color:#94a3b8}
.tab.active{color:#f1f5f9;border-bottom-color:#38bdf8;font-weight:700}
.nav-right{display:flex;align-items:center;gap:6px;margin-left:8px;flex-wrap:wrap}
.badge-loaded{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:2px 8px;font-size:9px;color:#22c55e;white-space:nowrap}
.btn{padding:5px 10px;border-radius:7px;font-size:9px;cursor:pointer;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-add{border:1px solid rgba(56,189,248,0.3);background:rgba(56,189,248,0.08);color:#38bdf8}
.btn-reset{border:1px solid rgba(255,255,255,0.08);background:transparent;color:#475569}

/* MAIN */
#main{padding:20px 16px;flex:1;max-width:1440px;width:100%;margin:0 auto}

/* CARDS */
.card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px}
.clabel{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:12px}

/* GRID */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g-a-b{display:grid;grid-template-columns:1fr 340px;gap:12px}
.g-a-c{display:grid;grid-template-columns:1fr 260px;gap:12px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.mb-10{margin-bottom:10px}
.mb-14{margin-bottom:14px}
.mb-18{margin-bottom:18px}

/* KPI */
.kpi{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:16px}
.kpi-label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-0.5px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:10px;color:#475569;margin-top:4px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:9px 11px;text-align:left;color:#475569;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06);text-transform:uppercase;letter-spacing:.8px;font-size:8.5px;white-space:nowrap;background:rgba(0,0,0,0.15);user-select:none}
th.sort{cursor:pointer}
th.sort:hover{color:#94a3b8}
th.sort.asc::after{content:" ↑"}
th.sort.desc::after{content:" ↓"}
td{padding:8px 11px;border-bottom:1px solid rgba(255,255,255,0.03);color:#cbd5e1;vertical-align:middle}
.tr-click:hover{background:rgba(255,255,255,0.028)!important;cursor:pointer}
.tr-risk:hover{background:rgba(239,68,68,0.04)!important;cursor:pointer}

/* BADGE */
.bdg{display:inline-block;font-size:8.5px;padding:2px 7px;border-radius:16px;font-weight:600;white-space:nowrap;vertical-align:middle}

/* MBAR */
.mbar{display:inline-block;height:4px;border-radius:2px;vertical-align:middle;background:rgba(255,255,255,0.05);width:56px;overflow:hidden}
.mbar-fill{height:100%;border-radius:2px}

/* SECTION HEADER */
.sec-head{margin-bottom:18px}
.sec-tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;font-weight:600;margin-bottom:3px}
.sec-h{font-size:21px;font-weight:800}

/* SEG CARDS */
.seg-card{border-radius:12px;padding:11px 13px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);transition:all .15s}
.seg-card:hover{opacity:.85}

/* CRM CARDS */
.crm-card{border-radius:13px;padding:16px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);transition:all .15s}

/* FILTER ROW */
.frow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.finput{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 11px;color:#e2e8f0;font-size:11px;outline:none;max-width:240px}
.fselect{background:#080d18;border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:7px 11px;color:#e2e8f0;font-size:11px;outline:none;cursor:pointer}
.fcount{font-size:10px;color:#475569;margin-left:auto}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:none;align-items:center;justify-content:center;padding:12px}
#modal.open{display:flex}
#modal-inner{background:#090d16;border:1px solid rgba(255,255,255,0.1);border-radius:18px;width:100%;max-width:820px;max-height:94vh;overflow-y:auto;padding:24px}
.m-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.m-name{font-size:17px;font-weight:800;color:#f1f5f9;margin-bottom:3px}
.m-email{font-size:11px;color:#475569;margin-bottom:8px}
.m-sec{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin:14px 0 8px}
.m-close{background:none;border:none;color:#475569;font-size:20px;cursor:pointer;padding:2px}
.kpi4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:4px}
.kpi4 .kp{background:rgba(255,255,255,0.03);border-radius:9px;padding:9px 11px}
.kpi4 .kp .kl{font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:2px}
.kpi4 .kp .kv{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
.crm-box{border-radius:10px;padding:12px 16px;margin-bottom:14px}

/* CANVAS CHARTS */
canvas{display:block}
.chart-wrap{position:relative;width:100%}

/* MISC */
.top8r{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.conc-grid{display:flex;gap:8px;margin-top:10px}
.conc-box{border-radius:8px;padding:8px 12px}
.flag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.flag-card{border-radius:11px;padding:13px 14px}
</style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="upload">
  <div class="logo-big">Coho<span>rix</span></div>
  <div class="logo-sub">iGaming Intelligence Platform</div>
  <div class="loaded-pills" id="loaded-pills"></div>
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".csv,.txt">
    <div class="drop-icon">📂</div>
    <div class="drop-text">Clique ou arraste o arquivo CSV</div>
    <div class="drop-hint">Carregue um arquivo de cada vez</div>
  </div>
  <div class="file-hints">
    <div class="fh"><div class="fh-icon">📊</div><div class="fh-title" style="color:#38bdf8">Transações</div><div class="fh-desc">User, Type, Amount, Date, Ref Code</div></div>
    <div class="fh"><div class="fh-icon">🎰</div><div class="fh-title" style="color:#a855f7">Bets</div><div class="fh-desc">Game, Stake, Win, Provider</div></div>
    <div class="fh"><div class="fh-icon">👤</div><div class="fh-title" style="color:#22c55e">Usuários/KYC</div><div class="fh-desc">Email, Registration Date, FTD Date</div></div>
  </div>
  <div id="upload-error"></div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div class="nav-logo">Coho<span>rix</span></div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div class="nav-right" id="nav-right"></div>
  </nav>
  <div id="main"></div>
</div>

<!-- MODAL -->
<div id="modal"><div id="modal-inner"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
var S = { txn: null, bets: null, users: null, data: null, tab: 'overview' };
var playerSort = 'deps', playerDir = -1, playerSeg = 'ALL', playerSearch = '', playerChan = 'ALL';
var gamesSort = 'stake', gamesDir = -1, gamesView = 'games', gamesSearch = '';
var crmFilter = 'ALL';
var castroSearch = '', castroChan = 'ALL';

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
var BRL = function(n){ return 'R$ ' + Math.abs(n||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); };
var PCT = function(n){ return (n||0).toFixed(1) + '%'; };
var GC  = function(n){ return n >= 0 ? '#22c55e' : '#ef4444'; };
var ESC = function(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
var CLAMP = function(v,lo,hi){ return Math.min(hi, Math.max(lo, v)); };
var PC = ['#38bdf8','#22c55e','#a855f7','#f59e0b','#f97316','#ef4444','#34d399','#e879f9'];

var SEGS = {
  whale:             { label:'Whale',          color:'#f59e0b', icon:'🐋' },
  high_value:        { label:'High Value',     color:'#a855f7', icon:'💎' },
  mid_value:         { label:'Mid Value',      color:'#38bdf8', icon:'⭐' },
  low_value:         { label:'Low Value',      color:'#64748b', icon:'·'  },
  registered_no_dep: { label:'Sem Depósito',   color:'#ef4444', icon:'○'  },
  unregistered:      { label:'Não Cadastrado', color:'#475569', icon:'?'  }
};
var FMAP = {
  bonus_hunter:          { label:'Bonus Hunter',        color:'#f97316' },
  withdrawal_excess:     { label:'Saque Excessivo',     color:'#ef4444' },
  rtp_extreme:           { label:'RTP Extremo',         color:'#ef4444' },
  rtp_high_volume:       { label:'RTP Alto+Vol',        color:'#f97316' },
  single_game:           { label:'1 Jogo/Alto Vol',     color:'#eab308' },
  fragmented_withdrawal: { label:'Saque Fracionado',    color:'#eab308' },
  dep_equals_bet:        { label:'Dep=Aposta (Bot)',    color:'#ef4444' }
};

function badge(txt, color) {
  return '<span class="bdg" style="background:'+color+'1a;color:'+color+';border:1px solid '+color+'30">'+ESC(txt)+'</span>';
}
function mbar(val, max, color) {
  var pct = CLAMP(Math.abs(val) / (Math.abs(max)||1) * 100, 0, 100);
  return '<span class="mbar"><span class="mbar-fill" style="width:'+pct+'%;background:'+color+'"></span></span>';
}

// ═══════════════════════════════════════════════════════════════
// PARSERS
// ═══════════════════════════════════════════════════════════════
function parseRow(line) {
  var out = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  out.push(cur.trim());
  return out;
}

function detect(text) {
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  var i, hi, p, hdr, col;

  // Transactions
  for (hi = 0; hi < Math.min(15, lines.length); hi++) {
    if (['User','Type','Amount','Date'].every(function(k){ return lines[hi].indexOf(k) > -1; })) {
      hdr = lines[hi].split(',').map(function(h){ return h.trim(); });
      col = {};
      hdr.forEach(function(h, i){ col[h] = i; });
      function gt(p, k){ return col[k] != null && col[k] < p.length ? p[col[k]].trim().replace(/^"|"$/g,'') : ''; }
      var rows = [];
      for (i = hi+1; i < lines.length; i++) {
        p = lines[i].split(',');
        var u = gt(p,'User'); if (!u) continue;
        rows.push({ user:u, type:gt(p,'Type'), refCode:gt(p,'Ref Code'), date:gt(p,'Date'), amount:parseFloat(gt(p,'Amount'))||0, balanceAfter:parseFloat(gt(p,'Balance After'))||0 });
      }
      if (rows.length > 10) return { kind:'transactions', rows:rows };
    }
  }

  // Bets
  for (hi = 0; hi < Math.min(15, lines.length); hi++) {
    if (['Game','Stake','Provider','Win'].every(function(k){ return lines[hi].indexOf(k) > -1; })) {
      hdr = parseRow(lines[hi]);
      col = {};
      hdr.forEach(function(h, i){ col[h.trim()] = i; });
      function gb(p, k){ return col[k] != null && col[k] < p.length ? p[col[k]].replace(/^"|"$/g,'').trim() : ''; }
      var bets = [];
      for (i = hi+1; i < lines.length; i++) {
        p = parseRow(lines[i]);
        var u2 = gb(p,'User'); if (!u2) continue;
        bets.push({ user:u2, game:gb(p,'Game'), provider:gb(p,'Provider'), refCode:gb(p,'Ref Code'), date:gb(p,'Date'), stake:parseFloat(gb(p,'Stake'))||0, win:parseFloat(gb(p,'Win'))||0, status:gb(p,'Status'), bonus:gb(p,'Bonus bet').toLowerCase()==='true' });
      }
      if (bets.length > 10) return { kind:'bets', bets:bets };
    }
  }

  // Users
  for (hi = 0; hi < Math.min(15, lines.length); hi++) {
    if (lines[hi].indexOf('Email') > -1 && lines[hi].indexOf('Registration Date') > -1) {
      hdr = parseRow(lines[hi]);
      col = {};
      hdr.forEach(function(h, i){ col[h.trim()] = i; });
      function gu(p, k){ return col[k] != null && col[k] < p.length ? p[col[k]].replace(/^"|"$/g,'').trim() : ''; }
      var users = [];
      for (i = hi+1; i < lines.length; i++) {
        p = parseRow(lines[i]);
        var em = gu(p,'Email'); if (!em) continue;
        users.push({ email:em, fullName:(gu(p,'First Name')+' '+gu(p,'Last Name')).trim(), refCode:gu(p,'Ref Code'), registrationDate:gu(p,'Registration Date'), ftdDate:gu(p,'FTD Date'), firstDeposit:parseFloat(gu(p,'First Deposit'))||0, mainBalance:parseFloat(gu(p,'Main Balance'))||0, status:gu(p,'Status'), verification:gu(p,'Verification') });
      }
      if (users.length > 0) return { kind:'users', users:users };
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════════════════════════════
function compute(txnRaw, betsRaw, usersRaw) {
  var pMap = {}, chMap = {}, dayMap = {};

  if (txnRaw) {
    txnRaw.forEach(function(r) {
      if (!pMap[r.user]) pMap[r.user] = { email:r.user, deps:0, withs:0, bets_t:0, wins_t:0, depCnt:0, withCnt:0, rc:'', dates:[], fs:0 };
      var p = pMap[r.user];
      if (!p.rc && r.refCode) p.rc = r.refCode;
      if (r.date) p.dates.push(r.date.slice(0,10));
      var rc = r.refCode || '—';
      if (!chMap[rc]) chMap[rc] = { name:rc, deps:0, withs:0, bets:0, wins:0, us:{} };
      chMap[rc].us[r.user] = 1;
      var day = r.date ? r.date.slice(0,10) : null;
      if (day) { if (!dayMap[day]) dayMap[day] = { date:day, deps:0, withs:0, us:{} }; dayMap[day].us[r.user] = 1; }
      if (r.type === 'Deposit')     { p.deps += r.amount; p.depCnt++; chMap[rc].deps += r.amount; if (day) dayMap[day].deps += r.amount; }
      if (r.type === 'Withdrawal')  { p.withs += r.amount; p.withCnt++; chMap[rc].withs += r.amount; if (day) dayMap[day].withs += r.amount; }
      if (r.type === 'Bet')         { p.bets_t += r.amount; chMap[rc].bets += r.amount; }
      if (r.type === 'Win')         { p.wins_t += r.amount; chMap[rc].wins += r.amount; }
      if (r.type === 'FreeSpinWin') { p.fs += r.amount; }
    });
  }

  var bpMap = {}, gmMap = {}, prMap = {};
  var bStake = 0, bWin = 0, bCnt = 0;

  if (betsRaw) {
    betsRaw.forEach(function(b) {
      if (!bpMap[b.user]) bpMap[b.user] = { stake:0, win:0, cnt:0, gs:{}, ss:{}, bStake:0, bWin:0, bCnt:0 };
      var bp = bpMap[b.user];
      bp.stake += b.stake; bp.win += b.win; bp.cnt++; bp.gs[b.game] = 1;
      if (b.date) bp.ss[b.date.slice(0,10)] = 1;
      if (b.bonus) { bp.bStake += b.stake; bp.bWin += b.win; bp.bCnt++; bStake += b.stake; bWin += b.win; bCnt++; }
      if (!gmMap[b.game]) gmMap[b.game] = { name:b.game, stake:0, win:0, cnt:0, us:{}, prov:b.provider };
      gmMap[b.game].stake += b.stake; gmMap[b.game].win += b.win; gmMap[b.game].cnt++; gmMap[b.game].us[b.user] = 1;
      if (!prMap[b.provider]) prMap[b.provider] = { name:b.provider, stake:0, win:0, cnt:0, gs:{} };
      prMap[b.provider].stake += b.stake; prMap[b.provider].win += b.win; prMap[b.provider].cnt++; prMap[b.provider].gs[b.game] = 1;
    });
  }

  var allE = {};
  Object.keys(pMap).forEach(function(e){ allE[e] = 1; });
  Object.keys(bpMap).forEach(function(e){ allE[e] = 1; });
  if (usersRaw) usersRaw.forEach(function(u){ allE[u.email] = 1; });

  var players = [];
  Object.keys(allE).forEach(function(email) {
    var t = pMap[email] || {};
    var b = bpMap[email] || {};
    var u = (usersRaw && usersRaw.find(function(x){ return x.email === email; })) || {};
    var deps = t.deps||0, withs = t.withs||0, ggr = deps - withs;
    var bets = b.stake||0, bwins = b.win||0;
    var rtp  = bets > 0 ? bwins/bets*100 : 0;
    var wb   = (t.bets_t||0) > 0 ? (t.wins_t||0)/t.bets_t*100 : 0;
    var margin = deps > 0 ? ggr/deps*100 : 0;
    var ticket = (t.depCnt||0) > 0 ? deps/t.depCnt : 0;
    var du = {}; (t.dates||[]).forEach(function(d){ du[d]=1; });
    var activeDays = Object.keys(du).length;
    var ds = (t.dates||[]).slice().sort();
    var lastSeen = ds.length ? ds[ds.length-1] : '';
    var daysSince = lastSeen ? Math.floor((new Date('2026-03-10') - new Date(lastSeen)) / 86400000) : 999;
    var seg = 'unregistered';
    if (deps >= 50000) seg = 'whale';
    else if (deps >= 10000) seg = 'high_value';
    else if (deps >= 1000) seg = 'mid_value';
    else if (deps > 0) seg = 'low_value';
    else if (u.email) seg = 'registered_no_dep';
    var flags = [];
    if (wb > 130 && bets > 5000) flags.push('bonus_hunter');
    if (withs > deps*1.3 && deps > 0) flags.push('withdrawal_excess');
    if (rtp > 130 && bets > 5000) flags.push('rtp_extreme');
    if (rtp > 110 && bets > 10000) flags.push('rtp_high_volume');
    if (Object.keys(b.gs||{}).length === 1 && bets > 10000) flags.push('single_game');
    if ((t.withCnt||0) >= 4) flags.push('fragmented_withdrawal');
    if (t.depCnt > 0 && (t.bets_t||0) > 0 && Math.abs(deps-(t.bets_t))/deps < 0.02 && deps > 500) flags.push('dep_equals_bet');
    var crm = null;
    if (flags.indexOf('bonus_hunter')>-1 || flags.indexOf('rtp_extreme')>-1) crm = { type:'block_review', label:'🚫 Revisar & Bloquear', color:'#ef4444' };
    else if (seg==='whale' && daysSince>7)          crm = { type:'vip_call',    label:'📞 Ligar VIP Inativo',   color:'#f59e0b' };
    else if (seg==='high_value' && daysSince>14)    crm = { type:'reactivate',  label:'💎 Oferta VIP',          color:'#a855f7' };
    else if (seg==='mid_value' && daysSince>21)     crm = { type:'free_spin',   label:'🎰 Free Spins',          color:'#38bdf8' };
    else if (seg==='registered_no_dep')             crm = { type:'ftd_bonus',   label:'🎁 Bônus 1º Depósito',   color:'#22c55e' };
    else if (daysSince>30 && deps>0)               crm = { type:'sms_reeng',   label:'📱 SMS Re-engajamento',  color:'#64748b' };
    players.push({
      email:email, fullName:u.fullName||'', verification:u.verification||'',
      registrationDate:u.registrationDate||'', ftdDate:u.ftdDate||'', firstDeposit:u.firstDeposit||0,
      refCode:t.rc||b.rc||u.refCode||'—',
      deps:deps, withs:withs, ggr:ggr, margin:margin, ticket:ticket,
      bets_t:t.bets_t||0, wins_t:t.wins_t||0, wb:wb,
      betsStake:bets, betsWin:bwins, rtp:rtp,
      depCnt:t.depCnt||0, withCnt:t.withCnt||0,
      activeDays:activeDays, sessionCnt:Object.keys(b.ss||{}).length, gameCnt:Object.keys(b.gs||{}).length,
      bStake:b.bStake||0, bWin:b.bWin||0, bCnt:b.bCnt||0, fs:t.fs||0,
      lastSeen:lastSeen, daysSince:daysSince, segment:seg, flags:flags, risk:flags.length, crm:crm
    });
  });

  var channels = Object.values(chMap).map(function(c) {
    var ggr = c.deps - c.withs;
    var ul = Object.keys(c.us);
    var ftd = ul.filter(function(e){ return (pMap[e] && pMap[e].depCnt||0) > 0; }).length;
    var cp = players.filter(function(p){ return p.refCode === c.name; });
    var da = cp.map(function(p){ return p.deps; });
    return {
      name:c.name, users:ul.length, ggr:ggr, ftd:ftd, deps:c.deps, withs:c.withs,
      margin:c.deps>0?ggr/c.deps*100:0, ticket:ul.length>0?c.deps/ul.length:0,
      ggrPerFTD:ftd>0?ggr/ftd:0,
      concentration:c.deps>0?(da.length?Math.max.apply(null,da):0)/c.deps*100:0,
      playerCount:cp.length
    };
  }).sort(function(a,b){ return b.deps-a.deps; });

  var games = Object.values(gmMap).map(function(g) {
    var rtp = g.stake>0 ? g.win/g.stake*100 : 0;
    var ggr = g.stake - g.win;
    var uc = Object.keys(g.us).length;
    var flags = [];
    if (rtp > 110 && g.stake > 1000) flags.push('rtp_high');
    if (uc <= 2 && g.stake > 5000) flags.push('concentrated');
    return { name:g.name, stake:g.stake, win:g.win, cnt:g.cnt, rtp:rtp, ggr:ggr, users:uc, prov:g.prov, flags:flags };
  }).sort(function(a,b){ return b.stake-a.stake; });

  var providers = Object.values(prMap).map(function(p) {
    return { name:p.name, stake:p.stake, win:p.win, cnt:p.cnt, rtp:p.stake>0?p.win/p.stake*100:0, ggr:p.stake-p.win, games:Object.keys(p.gs).length };
  }).sort(function(a,b){ return b.stake-a.stake; });

  var daily = Object.values(dayMap).map(function(d) {
    return { date:d.date, deps:d.deps, withs:d.withs, ggr:d.deps-d.withs, users:Object.keys(d.us).length };
  }).sort(function(a,b){ return a.date>b.date?1:-1; });

  var regStats = null;
  if (usersRaw) {
    var bc = {};
    usersRaw.forEach(function(u) {
      var rc = u.refCode || '(sem canal)';
      if (!bc[rc]) bc[rc] = { name:rc, total:0, ftd:0, ftdAmt:0 };
      bc[rc].total++;
      if (u.ftdDate) { bc[rc].ftd++; bc[rc].ftdAmt += u.firstDeposit; }
    });
    var cs = Object.values(bc).map(function(c) {
      return { name:c.name, total:c.total, ftd:c.ftd, ftdAmt:c.ftdAmt, conv:c.total>0?c.ftd/c.total*100:0, avgFTD:c.ftd>0?c.ftdAmt/c.ftd:0 };
    }).sort(function(a,b){ return b.total-a.total; });
    var ftdCnt = usersRaw.filter(function(u){ return u.ftdDate; }).length;
    regStats = { users:usersRaw, chanStats:cs, total:usersRaw.length, ftd:ftdCnt, noFtd:usersRaw.length-ftdCnt, conv:usersRaw.length>0?ftdCnt/usersRaw.length*100:0 };
  }

  var tDeps = players.reduce(function(a,p){ return a+p.deps; }, 0);
  var tWiths = players.reduce(function(a,p){ return a+p.withs; }, 0);
  var tGGR = tDeps - tWiths;
  var tBetsS = players.reduce(function(a,p){ return a+p.betsStake; }, 0);
  var tBetsW = players.reduce(function(a,p){ return a+p.betsWin; }, 0);

  return {
    players:players, channels:channels, games:games, providers:providers, daily:daily, regStats:regStats,
    bStake:bStake, bWin:bWin, bCnt:bCnt,
    tDeps:tDeps, tWiths:tWiths, tGGR:tGGR, ngr:tGGR-(bWin-bStake),
    tBetsS:tBetsS, tBetsW:tBetsW,
    fraud:players.filter(function(p){ return p.risk>=2; }),
    txnRows:txnRaw||[]
  };
}

// CANVAS CHARTS
// ═══════════════════════════════════════════════════════════════
function drawBarChart(canvasId, data, keyY, colorFn) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !data || !data.length) return;
  var W = canvas.parentElement.offsetWidth || 500;
  var H = canvas.height;
  canvas.width = W;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  var vals = data.map(function(d){ return d[keyY]||0; });
  var maxV = Math.max.apply(null, vals.map(Math.abs)); if (!maxV) maxV = 1;
  var minV = Math.min.apply(null, vals);
  var allPos = minV >= 0;

  var padL=42, padR=8, padT=8, padB=28;
  var cw = W-padL-padR, ch = H-padT-padB;
  var bw = Math.max(3, cw/data.length - 3);
  var bspace = cw/data.length;
  var zeroY = allPos ? padT+ch : padT + (maxV/(maxV-minV)) * ch;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var i=0; i<=4; i++) {
    var y = padT + i/4*ch;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+cw,y); ctx.stroke();
    var v = allPos ? maxV*(1-i/4) : maxV - i/4*(maxV-minV);
    ctx.fillStyle = '#475569';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(Math.abs(v)>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0), padL-4, y+3);
  }

  // Zero line
  if (!allPos) {
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL,zeroY); ctx.lineTo(padL+cw,zeroY); ctx.stroke();
  }

  // Bars
  data.forEach(function(d, i) {
    var v = d[keyY]||0;
    var barH = allPos ? Math.abs(v)/maxV*ch : Math.abs(v)/(maxV-minV)*ch;
    var x = padL + i*bspace + (bspace-bw)/2;
    var y = v >= 0 ? zeroY-barH : zeroY;
    ctx.fillStyle = typeof colorFn === 'function' ? colorFn(v) : (colorFn||'#38bdf8');
    ctx.beginPath();
    ctx.roundRect(x, y, bw, Math.max(2,barH), [2]);
    ctx.fill();

    // Label
    if (data.length <= 15) {
      ctx.fillStyle = '#475569';
      ctx.font = '8px system-ui';
      ctx.textAlign = 'center';
      var lbl = String(d.name||d.date||'').slice(0,8);
      ctx.fillText(lbl, x+bw/2, H-6);
    }
  });
}

function drawPieChart(canvasId, data) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !data || !data.length) return;
  var W = canvas.width, H = canvas.height;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  var total = data.reduce(function(a,d){ return a+(d.value||0); }, 0);
  if (!total) return;
  var cx = W/2, cy = H/2, r = Math.min(W,H)/2-6, ir = r*0.45;
  var start = -Math.PI/2;
  data.forEach(function(d, i) {
    var angle = (d.value/total) * Math.PI*2;
    ctx.fillStyle = d.color || PC[i%PC.length];
    ctx.beginPath();
    ctx.moveTo(cx + ir*Math.cos(start), cy + ir*Math.sin(start));
    ctx.arc(cx, cy, r, start, start+angle);
    ctx.arc(cx, cy, ir, start+angle, start, true);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#060810';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    start += angle;
  });
}

function scheduleDraw(fn) {
  setTimeout(fn, 30);
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(email) {
  var d = S.data;
  var p = d.players.find(function(x){ return x.email===email; });
  var u = d.regStats && d.regStats.users.find(function(x){ return x.email===email; });
  if (!p && !u) return;
  if (!p) p = { email:email, fullName:u.fullName, verification:u.verification, registrationDate:u.registrationDate, ftdDate:u.ftdDate, firstDeposit:u.firstDeposit, refCode:u.refCode||'—', deps:0,withs:0,ggr:0,margin:0,ticket:0,wb:0,betsStake:0,betsWin:0,rtp:0,depCnt:0,withCnt:0,activeDays:0,sessionCnt:0,gameCnt:0,bStake:0,bWin:0,bCnt:0,fs:0,daysSince:999,flags:[],segment:'registered_no_dep',risk:0,crm:{type:'ftd_bonus',label:'🎁 Bônus 1º Depósito',color:'#22c55e'} };

  var s = SEGS[p.segment]||SEGS.unregistered;
  var VC = {PartlyVerified:'#f59e0b', NotVerified:'#ef4444', Verified:'#22c55e'};
  var txns = d.txnRows.filter(function(r){ return r.user===p.email; }).slice().sort(function(a,b){ return b.date>a.date?1:-1; }).slice(0,40);

  function ksmall(l,v,c,accent) {
    return '<div class="kp" style="'+(accent?'background:'+c+'06;border:1px solid '+c+'20':'')+'"">'+
      '<div class="kl">'+ESC(l)+'</div>'+
      '<div class="kv" style="color:'+c+'">'+ESC(String(v))+'</div>'+
    '</div>';
  }

  var html =
  '<div class="m-head">'+
    '<div>'+
      '<div class="m-name">'+ESC(p.fullName||p.email.split('@')[0])+'</div>'+
      '<div class="m-email">'+ESC(p.email)+'</div>'+
      '<div style="display:flex;gap:5px;flex-wrap:wrap">'+
        badge(s.icon+' '+s.label, s.color)+' '+
        badge(p.refCode||'—', '#38bdf8')+' '+
        (p.verification?badge(p.verification, VC[p.verification]||'#94a3b8')+' ':'')+
        p.flags.map(function(f){ var fd=FMAP[f]||{label:f,color:'#94a3b8'}; return badge(fd.label,fd.color)+' '; }).join('')+
      '</div>'+
    '</div>'+
    '<button class="m-close" id="m-close">✕</button>'+
  '</div>'+
  '<div class="m-sec">Performance Financeira</div>'+
  '<div class="kpi4">'+
    ksmall('Depósitos',BRL(p.deps),'#22c55e')+
    ksmall('Saques',BRL(p.withs),'#94a3b8')+
    ksmall('GGR',(p.ggr>=0?'+':'−')+BRL(p.ggr),GC(p.ggr))+
    ksmall('Margem',PCT(p.margin),GC(p.margin))+
    ksmall('Ticket Médio',BRL(p.ticket),'#f59e0b')+
    ksmall('Win/Bet',PCT(p.wb),p.wb>100?'#ef4444':'#22c55e')+
    ksmall('Nº Dep.',(p.depCnt||0)+'x','#94a3b8')+
    ksmall('Dias Ativo',(p.activeDays||0)+'d','#94a3b8')+
  '</div>';

  if (p.betsStake > 0) {
    html += '<div class="m-sec" style="color:#a855f7">Performance de Apostas</div>'+
    '<div class="kpi4">'+
      ksmall('Apostado',BRL(p.betsStake),'#a855f7',true)+
      ksmall('GGR Bets',(p.betsStake-p.betsWin>=0?'+':'−')+BRL(Math.abs(p.betsStake-p.betsWin)),GC(p.betsStake-p.betsWin),true)+
      ksmall('RTP',PCT(p.rtp),p.rtp>120?'#ef4444':p.rtp>105?'#f97316':'#22c55e',true)+
      ksmall('Jogos',(p.gameCnt||0)+'','#38bdf8',true)+
      ksmall('Sessões',(p.sessionCnt||0)+'d','#94a3b8',true)+
      ksmall('Bônus',(p.bCnt||0)+'','#f59e0b',true)+
      ksmall('Free Spins',BRL(p.fs||0),'#a855f7',true)+
      ksmall('Último Acesso',p.lastSeen||'—','#64748b',true)+
    '</div>';
  }

  if (p.crm) {
    html += '<div class="crm-box" style="background:'+p.crm.color+'0e;border:1px solid '+p.crm.color+'28">'+
      '<div style="font-size:8.5px;color:'+p.crm.color+';text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:3px">Ação CRM Sugerida</div>'+
      '<div style="font-size:14px;font-weight:700;color:'+p.crm.color+'">'+ESC(p.crm.label)+'</div>'+
      '<div style="font-size:10px;color:#64748b;margin-top:3px">Inativo há '+(p.daysSince<999?p.daysSince+' dias':'—')+' · '+ESC(s.label)+'</div>'+
    '</div>';
  }

  if (txns.length) {
    var tcols = {Win:'#22c55e',Bet:'#f59e0b',Deposit:'#38bdf8',Withdrawal:'#ef4444',FreeSpinWin:'#a855f7'};
    html += '<div class="m-sec" style="color:#475569">Últimas '+txns.length+' Transações</div>'+
    '<div class="tbl-wrap"><table>'+
      '<thead><tr><th>Data</th><th>Tipo</th><th>Valor</th><th>Saldo Após</th></tr></thead>'+
      '<tbody>'+txns.map(function(t) {
        return '<tr><td style="color:#64748b;font-size:10px">'+(t.date?t.date.slice(0,16):'')+'</td>'+
          '<td style="color:'+(tcols[t.type]||'#94a3b8')+';font-weight:600">'+ESC(t.type)+'</td>'+
          '<td style="font-weight:600">'+BRL(t.amount)+'</td>'+
          '<td style="color:#475569">'+BRL(t.balanceAfter)+'</td></tr>';
      }).join('')+'</tbody>'+
    '</table></div>';
  }

  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal').classList.add('open');
  document.getElementById('m-close').addEventListener('click', closeModal);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════
// RENDER DISPATCH
// ═══════════════════════════════════════════════════════════════
function renderTab() {
  var fn = {overview:renderOverview, players:renderPlayers, campaigns:renderCampaigns, crm:renderCRM, risk:renderRisk, games:renderGames, users:renderCadastros}[S.tab];
  if (fn) fn();
}

// ═══════════════════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════════════════
function handleFile(file) {
  if (!file) return;
  document.getElementById('upload-error').textContent = '';
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var result = detect(e.target.result);
      if (!result) { document.getElementById('upload-error').textContent = '⚠ Arquivo não reconhecido. Use CSV de transações (User,Type,Amount), apostas (Game,Stake,Win) ou usuários (Email,Registration Date).'; return; }
      if (result.kind === 'transactions') { S.txn = result.rows; S.tab = 'overview'; }
      if (result.kind === 'bets')         { S.bets = result.bets; S.tab = 'games'; }
      if (result.kind === 'users')        { S.users = result.users; S.tab = 'users'; }
      S.data = compute(S.txn, S.bets, S.users);
      showApp();
    } catch(ex) {
      document.getElementById('upload-error').textContent = '⚠ Erro: ' + ex.message;
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function showApp() {
  document.getElementById('upload').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  renderNav();
  renderTab();
  bindNav();
}

function reset() {
  S.txn = null; S.bets = null; S.users = null; S.data = null; S.tab = 'overview';
  document.getElementById('upload').style.display = '';
  document.getElementById('app').classList.remove('visible');
  updateLoadedPills();
}

function updateLoadedPills() {
  var loaded = [S.txn&&'Transações', S.bets&&'Apostas', S.users&&'Usuários'].filter(Boolean);
  document.getElementById('loaded-pills').innerHTML = loaded.map(function(k){ return '<div class="pill-ok">✓ '+k+'</div>'; }).join('');
}

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function bindNav() {
  // Tabs
  document.getElementById('nav-tabs').addEventListener('click', function(e) {
    var t = e.target.closest('[data-tab]');
    if (t) { S.tab = t.dataset.tab; renderNav(); renderTab(); bindNav(); }
  });

  var btnAdd = document.getElementById('btn-add');
  if (btnAdd) btnAdd.addEventListener('click', function() {
    var inp = document.createElement('input'); inp.type='file'; inp.accept='.csv,.txt';
    inp.addEventListener('change', function(){ handleFile(inp.files[0]); });
    inp.click();
  });

  var btnReset = document.getElementById('btn-reset');
  if (btnReset) btnReset.addEventListener('click', reset);
}

function bindMain() {
  var main = document.getElementById('main');
  if (!main) return;

  // Player modal clicks
  main.addEventListener('click', function(e) {
    var row = e.target.closest('[data-pl]');
    if (row) { openModal(row.dataset.pl); return; }

    // Segment filter
    var seg = e.target.closest('[data-seg]');
    if (seg) { playerSeg = playerSeg===seg.dataset.seg?'ALL':seg.dataset.seg; renderPlayers(); bindMain(); return; }

    // Player sort
    var ps = e.target.closest('[data-ps]');
    if (ps) {
      var k = ps.dataset.ps;
      if (playerSort===k) playerDir=-playerDir; else { playerSort=k; playerDir=-1; }
      renderPlayers(); bindMain(); return;
    }

    // Games sort
    var gs = e.target.closest('[data-gs]');
    if (gs) {
      var k2 = gs.dataset.gs;
      if (gamesSort===k2) gamesDir=-gamesDir; else { gamesSort=k2; gamesDir=-1; }
      renderGames(); bindMain(); return;
    }

    // Games view toggle
    if (e.target.id==='gv-games') { gamesView='games'; renderGames(); bindMain(); return; }
    if (e.target.id==='gv-provs') { gamesView='providers'; renderGames(); bindMain(); return; }

    // CRM filter
    var crm = e.target.closest('[data-crm]');
    if (crm) { crmFilter=crmFilter===crm.dataset.crm?'ALL':crm.dataset.crm; renderCRM(); bindMain(); return; }
    if (e.target.id==='crm-clear') { crmFilter='ALL'; renderCRM(); bindMain(); return; }
  });

  // Inputs
  function bindInput(id, fn) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', fn);
  }
  function bindChange(id, fn) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('change', fn);
  }

  bindInput('p-search', function(e){ playerSearch=e.target.value; renderPlayers(); bindMain(); });
  bindChange('p-chan',   function(e){ playerChan=e.target.value; renderPlayers(); bindMain(); });
  bindInput('g-search', function(e){ gamesSearch=e.target.value; renderGames(); bindMain(); });
  bindInput('cs-search',function(e){ castroSearch=e.target.value; renderCadastros(); bindMain(); });
  bindChange('cs-chan',  function(e){ castroChan=e.target.value; renderCadastros(); bindMain(); });
}

// Observe main changes to rebind
var mainObserver = new MutationObserver(function(){ bindMain(); });

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
(function init() {
  // Drop zone
  var dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('drag'); });
  dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });

  document.getElementById('file-input').addEventListener('change', function(e){ handleFile(e.target.files[0]); });

  // Modal close on overlay click
  document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

  // Observe #main
  mainObserver.observe(document.getElementById('main')||document.body, { childList:true, subtree:false });

  // Make observer watch #main once app becomes visible
  var appObserver = new MutationObserver(function(){
    var m = document.getElementById('main');
    if (m) { mainObserver.observe(m, { childList:true }); appObserver.disconnect(); }
  });
  appObserver.observe(document.getElementById('app'), { childList:true });
})();
</script>
